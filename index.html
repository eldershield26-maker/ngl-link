
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  .wrap{min-height:600px;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:2rem 1rem;display:flex;flex-direction:column;align-items:center;font-family:'DM Sans',sans-serif}
  .badge{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:999px;margin-bottom:1.5rem}
  .avatar{width:72px;height:72px;border-radius:50%;background:#667eea;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;margin-bottom:1rem}
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:#fff;margin-bottom:0.3rem;text-align:center}
  .sub{color:rgba(255,255,255,0.5);font-size:0.9rem;margin-bottom:2rem;text-align:center}
  .card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:1.5rem;width:100%;max-width:420px}
  .card label{display:block;font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;padding:14px;resize:none;min-height:120px;outline:none;transition:border 0.2s}
  textarea:focus{border-color:rgba(102,126,234,0.8)}
  textarea::placeholder{color:rgba(255,255,255,0.25)}
  .ig-row{display:flex;align-items:center;gap:10px;margin:1rem 0}
  .ig-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.55)}
  .toggle-box{width:36px;height:20px;border-radius:999px;background:rgba(255,255,255,0.15);position:relative;transition:background 0.2s;flex-shrink:0}
  .toggle-box.on{background:#667eea}
  .toggle-knob{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left 0.2s}
  .toggle-box.on .toggle-knob{left:19px}
  #ig-input-wrap{overflow:hidden;max-height:0;transition:max-height 0.3s ease}
  #ig-input-wrap.show{max-height:80px;margin-top:10px}
  .ig-field{display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;overflow:hidden}
  .ig-field span{padding:0 12px;color:rgba(255,255,255,0.35);font-size:15px;border-right:1px solid rgba(255,255,255,0.1)}
  .ig-field input{background:transparent;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;padding:12px;flex:1}
  .ig-field input::placeholder{color:rgba(255,255,255,0.2)}
  .send-btn{width:100%;background:#667eea;border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;padding:14px;cursor:pointer;margin-top:1.2rem;transition:opacity 0.2s,transform 0.1s}
  .send-btn:hover{opacity:0.88}
  .send-btn:active{transform:scale(0.98)}
  .lock-note{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:1rem;color:rgba(255,255,255,0.3);font-size:12px}
  .success{display:none;flex-direction:column;align-items:center;padding:2rem 1rem;text-align:center;width:100%;max-width:420px}
  .success.show{display:flex}
  .check{width:60px;height:60px;border-radius:50%;background:#43e97b;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:1rem}
  .success h2{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:0.5rem}
  .success p{color:rgba(255,255,255,0.5);font-size:14px}
  .data-panel{width:100%;max-width:420px;margin-top:1.5rem}
  .dpanel-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;font-family:'DM Sans',sans-serif}
  .dpanel-btn:hover{background:rgba(255,255,255,0.08)}
  .entries-list{display:none;border:1px solid rgba(255,255,255,0.08);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
  .entries-list.open{display:block}
  .entry-item{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
  .entry-item:last-child{border-bottom:none}
  .entry-msg{color:rgba(255,255,255,0.85);font-size:14px;margin-bottom:8px}
  .device-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
  .d-chip{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 10px}
  .d-chip-label{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:2px}
  .d-chip-val{font-size:12px;color:rgba(255,255,255,0.75);word-break:break-word}
  .ig-chip{display:inline-block;background:rgba(102,126,234,0.15);border:1px solid rgba(102,126,234,0.3);border-radius:6px;padding:3px 10px;font-size:12px;color:#a5b4fc;margin-bottom:6px}
  .time-str{font-size:11px;color:rgba(255,255,255,0.25);margin-top:8px}
  .empty-state{padding:1.5rem;text-align:center;color:rgba(255,255,255,0.25);font-size:13px}
  .clear-btn{width:100%;padding:10px;background:rgba(255,60,60,0.08);border:1px solid rgba(255,60,60,0.15);border-top:none;border-radius:0 0 12px 12px;color:rgba(255,120,120,0.6);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
</style>

<div class="wrap">
  <div class="badge">anonymous message</div>
  <div class="avatar">U</div>
  <h1>Ask Anything</h1>
  <p class="sub">send me an anonymous message</p>
  <div class="card" id="form-card">
    <label>your message</label>
    <textarea id="msg" placeholder="tell me something honestly... i won't know who you are" maxlength="300"></textarea>
    <div class="ig-row">
      <div class="ig-toggle" onclick="toggleIG()">
        <div class="toggle-box" id="tbox"><div class="toggle-knob"></div></div>
        <span>reveal my instagram (optional)</span>
      </div>
    </div>
    <div id="ig-input-wrap">
      <div class="ig-field">
        <span>@</span>
        <input type="text" id="ig-val" placeholder="your_username" autocomplete="off"/>
      </div>
    </div>
    <button class="send-btn" onclick="sendMsg()">Send Anonymously</button>
    <div class="lock-note">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      completely anonymous · no account needed
    </div>
  </div>
  <div class="success" id="success-screen">
    <div class="check">&#10003;</div>
    <h2>message sent!</h2>
    <p>delivered anonymously</p>
    <button class="send-btn" style="max-width:180px;margin-top:1.2rem" onclick="resetForm()">send another</button>
  </div>
  <div class="data-panel">
    <button class="dpanel-btn" onclick="togglePanel()">
      <span><span id="entry-count"></span></span>
      <span id="parrow">&#9662;</span>
    </button>
    <div class="entries-list" id="entries-list"></div>
  </div>
</div>

<script>
let igOn=false;
let entries=[];
try{entries=JSON.parse(localStorage.getItem('ngl_v4')||'[]');}catch(e){}

function getDeviceInfo(){
  const ua=navigator.userAgent;

  let brand='Unknown Android';
  if(/SamsungBrowser|SM-[A-Z0-9]/i.test(ua)) brand='Samsung';
  else if(/; K\)/.test(ua)&&/SamsungBrowser/i.test(ua)) brand='Samsung';
  else if(/Redmi|POCO/i.test(ua)) brand='Xiaomi / Redmi';
  else if(/Mi\s|MIUI/i.test(ua)) brand='Xiaomi';
  else if(/OnePlus|EB2|IN2|LE2|KB2/i.test(ua)) brand='OnePlus';
  else if(/vivo/i.test(ua)) brand='Vivo';
  else if(/OPPO|CPH\d/i.test(ua)) brand='OPPO';
  else if(/realme|RMX/i.test(ua)) brand='Realme';
  else if(/Pixel\s\d/i.test(ua)) brand='Google Pixel';
  else if(/Nokia/i.test(ua)) brand='Nokia';
  else if(/moto[- ]/i.test(ua)) brand='Motorola';
  else if(/Huawei|HUAWEI/i.test(ua)) brand='Huawei';
  else if(/Honor/i.test(ua)) brand='Honor';
  else if(/Sony|Xperia/i.test(ua)) brand='Sony';
  else if(/Tecno/i.test(ua)) brand='Tecno';
  else if(/Infinix/i.test(ua)) brand='Infinix';

  let device='Unknown';
  if(/iPhone/.test(ua)) device='iPhone';
  else if(/iPad/.test(ua)) device='iPad';
  else if(/Android/.test(ua)){
    const modelMatch=ua.match(/;\s*([A-Z]{2}-[A-Z0-9]+|Redmi[^;)]+|POCO[^;)]+|Pixel\s\d[^;)]*|CPH\d[^;)]+|RMX\d[^;)]+)/i);
    if(modelMatch) device=brand+' ('+modelMatch[1].trim()+')';
    else device=brand+' Phone';
  } else if(/Windows/.test(ua)) device='Windows PC';
  else if(/Macintosh/.test(ua)) device='Mac';
  else if(/Linux/.test(ua)) device='Linux PC';

  let os='Unknown';
  if(/CPU iPhone OS ([\d_]+)/.test(ua)) os='iOS '+RegExp.$1.replace(/_/g,'.');
  else if(/CPU OS ([\d_]+)/.test(ua)) os='iPadOS '+RegExp.$1.replace(/_/g,'.');
  else if(/Android ([\d.]+)/.test(ua)) os='Android '+RegExp.$1;
  else if(/Windows NT ([\d.]+)/.test(ua)){
    const v={'10.0':'10/11','6.3':'8.1','6.1':'7'};
    os='Windows '+(v[RegExp.$1]||RegExp.$1);
  } else if(/Mac OS X ([\d_]+)/.test(ua)) os='macOS '+RegExp.$1.replace(/_/g,'.');

  let browser='Unknown';
  if(/Instagram/.test(ua)) browser='Instagram App';
  else if(/FBAN|FBAV/.test(ua)) browser='Facebook App';
  else if(/SamsungBrowser\/([\d.]+)/.test(ua)) browser='Samsung Browser '+RegExp.$1.split('.')[0];
  else if(/MiuiBrowser/.test(ua)) browser='MIUI Browser';
  else if(/CriOS/.test(ua)) browser='Chrome (iOS)';
  else if(/EdgA?\//.test(ua)) browser='Edge';
  else if(/OPR\//.test(ua)) browser='Opera';
  else if(/Chrome\/([\d]+)/.test(ua)) browser='Chrome '+RegExp.$1;
  else if(/Firefox\/([\d]+)/.test(ua)) browser='Firefox '+RegExp.$1;
  else if(/Safari\//.test(ua)&&!/Chrome/.test(ua)) browser='Safari';

  const type=/Mobi|Android|iPhone|iPad/i.test(ua)?'Mobile':'Desktop';
  const lang=navigator.language||'Unknown';
  const tz=Intl&&Intl.DateTimeFormat?Intl.DateTimeFormat().resolvedOptions().timeZone||'Unknown':'Unknown';
  const scr=window.screen?window.screen.width+'x'+window.screen.height:'Unknown';
  const ref=document.referrer||'';
  const referrer=ref.includes('instagram')?'Instagram':ref.includes('facebook')?'Facebook':ref?ref.split('/')[2]||'Other':'Direct';

  return{device,os,browser,type,lang,tz,screen:scr,referrer,rawUA:ua.substring(0,120)};
}

function toggleIG(){
  igOn=!igOn;
  document.getElementById('tbox').classList.toggle('on',igOn);
  document.getElementById('ig-input-wrap').classList.toggle('show',igOn);
}

function sendMsg(){
  const msg=document.getElementById('msg').value.trim();
  if(!msg){document.getElementById('msg').style.borderColor='rgba(255,100,100,0.6)';return;}
  document.getElementById('msg').style.borderColor='';
  const ig=igOn?document.getElementById('ig-val').value.trim():null;
  const deviceInfo=getDeviceInfo();
  const entry={id:Date.now(),message:msg,instagram:ig||null,device:deviceInfo,time:new Date().toLocaleString()};
  entries.unshift(entry);
  try{localStorage.setItem('ngl_v4',JSON.stringify(entries));}catch(e){}

  fetch('https://formspree.io/f/meednnvl',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(entry)
  });
 

  document.getElementById('form-card').style.display='none';
  document.getElementById('success-screen').classList.add('show');
  renderEntries();
}

function resetForm(){
  document.getElementById('msg').value='';
  document.getElementById('ig-val').value='';
  igOn=false;
  document.getElementById('tbox').classList.remove('on');
  document.getElementById('ig-input-wrap').classList.remove('show');
  document.getElementById('form-card').style.display='block';
  document.getElementById('success-screen').classList.remove('show');
}

function togglePanel(){
  const l=document.getElementById('entries-list');
  l.classList.toggle('open');
  document.getElementById('parrow').innerHTML=l.classList.contains('open')?'&#9652;':'&#9662;';
}

function renderEntries(){
  document.getElementById('entry-count').textContent=entries.length;
  const l=document.getElementById('entries-list');
  if(!entries.length){l.innerHTML='<div class="empty-state">no messages yet</div>';return;}
  l.innerHTML=entries.map(e=>{
    const d=e.device||{};
    return`<div class="entry-item">
      ${e.instagram?`<div class="ig-chip">@${e.instagram}</div>`:''}
      <div class="entry-msg">${e.message.replace(/</g,'&lt;')}</div>
      <div class="device-grid">
        <div class="d-chip"><div class="d-chip-label">device</div><div class="d-chip-val">${d.device||'?'}</div></div>
        <div class="d-chip"><div class="d-chip-label">os</div><div class="d-chip-val">${d.os||'?'}</div></div>
        <div class="d-chip"><div class="d-chip-label">browser</div><div class="d-chip-val">${d.browser||'?'}</div></div>
        <div class="d-chip"><div class="d-chip-label">type</div><div class="d-chip-val">${d.type||'?'}</div></div>
        <div class="d-chip"><div class="d-chip-label">timezone</div><div class="d-chip-val">${d.tz||'?'}</div></div>
        <div class="d-chip"><div class="d-chip-label">language</div><div class="d-chip-val">${d.lang||'?'}</div></div>
        <div class="d-chip"><div class="d-chip-label">screen</div><div class="d-chip-val">${d.screen||'?'}</div></div>
        <div class="d-chip"><div class="d-chip-label">came from</div><div class="d-chip-val">${d.referrer||'?'}</div></div>
      </div>
      <div class="time-str">${e.time}</div>
    </div>`;
  }).join('')+'<button class="clear-btn" onclick="clearAll()">clear all</button>';
}

function clearAll(){
  if(confirm('clear all?')){entries=[];localStorage.removeItem('ngl_v4');renderEntries();}
}

renderEntries();
</script>
